<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EChecker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #fff;
    color: #1a1a1a;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 16px 28px;
    border-bottom: 1px solid #e5e7eb;
  }
  .logo { font-size: 1rem; font-weight: 700; color: #111; }

  /* タブ */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
  }
  .tab-btn {
    background: none;
    border: none;
    font-size: 0.88rem;
    font-weight: 600;
    color: #9ca3af;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.15s, color 0.15s;
  }
  .tab-btn:hover { background: #f3f4f6; color: #111; }
  .tab-btn.active { background: #111; color: #fff; }

  /* Look up */
  .lookup-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  #lookupInput {
    flex: 1;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    background: #f9fafb;
    color: #111;
    transition: border-color 0.2s;
  }
  #lookupInput:focus { border-color: #6366f1; }
  #lookupBtn {
    background: #111;
    border: none;
    color: #fff;
    font-size: 0.88rem;
    font-weight: 600;
    padding: 10px 24px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
  }
  #lookupBtn:hover { background: #6366f1; }
  .lookup-result {
    background: #f9fafb;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    padding: 18px 20px;
    display: none;
    flex-direction: column;
    gap: 14px;
  }
  .lookup-word {
    font-size: 1.3rem;
    font-weight: 800;
    color: #111;
  }
  .lookup-kind {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #9ca3af;
    margin-bottom: 4px;
  }
  .lookup-val {
    font-size: 0.93rem;
    color: #374151;
    line-height: 1.6;
  }
  .lookup-val.dont-make {
    color: #9ca3af;
    font-style: italic;
  }
  .lookup-divider {
    border: none;
    border-top: 1px solid #e5e7eb;
    margin: 0;
  }
  .lookup-not-found {
    color: #9ca3af;
    font-size: 0.88rem;
  }

  /* Word list */
  .wl-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
  }
  .wl-table th {
    background: #f3f4f6;
    color: #6b7280;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 14px;
    text-align: left;
    border-bottom: 1.5px solid #e5e7eb;
  }
  .wl-section-row td {
    background: #f9fafb;
    color: #6366f1;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 14px;
    border-top: 1.5px solid #e5e7eb;
    border-bottom: 1px solid #e5e7eb;
  }
  .wl-table td {
    padding: 9px 14px;
    border-bottom: 1px solid #f3f4f6;
    color: #111;
    vertical-align: top;
  }
  .wl-table tr:last-child td { border-bottom: none; }
  .wl-imi { color: #6b7280; }
  .wl-wrap {
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    overflow: hidden;
  }
  .wl-loading { color: #9ca3af; font-size: 0.88rem; padding: 12px 0; }

  main {
    flex: 1;
    padding: 24px 28px 100px;
    max-width: 1000px;
    margin: 0 auto;
    width: 100%;
  }

  .label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #9ca3af;
    margin-bottom: 6px;
  }
  textarea#mainText {
    width: 100%;
    height: 260px;
    background: #f9fafb;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    color: #111;
    font-family: inherit;
    font-size: 0.95rem;
    padding: 14px 16px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.75;
  }
  textarea#mainText:focus { border-color: #6366f1; }
  textarea#mainText::placeholder { color: #c4c8d0; }

  #adminBtn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #111;
    border: none;
    color: #fff;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 10px 20px;
    border-radius: 20px;
    cursor: pointer;
    z-index: 100;
  }
  #adminBtn:hover { background: #6366f1; }

  /* パスワードモーダル */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .overlay.open { display: flex; }

  .pass-modal {
    background: #fff;
    border-radius: 14px;
    padding: 28px 30px;
    width: 320px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .pass-modal h2 { font-size: 1rem; font-weight: 700; }
  .pass-modal input[type=password] {
    width: 100%;
    border: 1.5px solid #e5e7eb;
    border-radius: 8px;
    padding: 10px 13px;
    font-size: 0.9rem;
    outline: none;
    font-family: monospace;
    background: #f9fafb;
  }
  .pass-modal input[type=password]:focus { border-color: #6366f1; }
  .pass-err { color: #ef4444; font-size: 0.78rem; display: none; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-cancel {
    background: none; border: 1.5px solid #e5e7eb; color: #6b7280;
    border-radius: 8px; padding: 8px 16px; font-size: 0.83rem; cursor: pointer;
  }
  .btn-ok {
    background: #111; border: none; color: #fff;
    border-radius: 8px; padding: 8px 18px; font-size: 0.83rem;
    font-weight: 600; cursor: pointer;
  }
  .btn-ok:hover { background: #6366f1; }

  /* CMDモーダル */
  .cmd-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 300;
    align-items: center;
    justify-content: center;
  }
  .cmd-overlay.open { display: flex; }

  .cmd-modal {
    background: #0d0f1a;
    border-radius: 14px;
    width: 700px;
    max-width: 95vw;
    height: 520px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    overflow: hidden;
  }
  .cmd-titlebar {
    background: #1a1d2e;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #2e3150;
    flex-shrink: 0;
  }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #ffbd2e; }
  .dot-g { background: #28c840; }
  .cmd-title-text {
    flex: 1; text-align: center;
    font-size: 0.75rem; color: #6b7280;
    letter-spacing: 0.06em; font-family: monospace;
  }
  .cmd-close {
    background: none; border: none; color: #6b7280;
    font-size: 1rem; cursor: pointer; padding: 0 2px; line-height: 1;
  }
  .cmd-close:hover { color: #fff; }

  .cmd-output {
    flex: 1;
    overflow-y: auto;
    padding: 14px 18px;
    font-family: 'Courier New', monospace;
    font-size: 0.83rem;
    line-height: 1.65;
    color: #c9d1e0;
  }
  .cmd-line { margin-bottom: 1px; white-space: pre-wrap; word-break: break-all; }
  .cmd-in { color: #818cf8; }
  .cmd-in::before { content: '❯ '; color: #6366f1; }
  .cmd-ok { color: #34d399; }
  .cmd-err { color: #f87171; }
  .cmd-info { color: #6b7280; }
  .show-idx { color: #4b5563; }
  .show-val { color: #fbbf24; }

  .cmd-input-row {
    display: flex;
    align-items: center;
    padding: 12px 18px;
    border-top: 1px solid #1e2235;
    background: #0a0c14;
    gap: 10px;
    flex-shrink: 0;
  }
  .cmd-ps { color: #6366f1; font-family: monospace; font-size: 0.88rem; }
  #cmdInput {
    flex: 1;
    background: none; border: none; outline: none;
    color: #e2e8f0;
    font-family: 'Courier New', monospace;
    font-size: 0.88rem;
    caret-color: #818cf8;
  }


  /* ページ指定 */
  .page-section { margin-bottom: 0; }
  .range-container {
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #f9fafb;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    padding: 16px;
  }
  .range-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .range-select-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .range-select {
    border: 1.5px solid #e5e7eb;
    border-radius: 7px;
    padding: 6px 10px;
    font-size: 0.88rem;
    outline: none;
    background: #fff;
    color: #111;
    min-width: 140px;
  }
  .range-select:focus { border-color: #6366f1; }
  .range-dash { color: #9ca3af; font-size: 0.9rem; }
  .btn-add-range {
    background: #f3f4f6;
    border: 1.5px dashed #d1d5db;
    color: #6b7280;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    align-self: flex-start;
  }
  .btn-add-range:hover {
    background: #e5e7eb;
    border-color: #9ca3af;
    color: #111;
  }
  .btn-remove-range {
    background: none;
    border: none;
    color: #9ca3af;
    font-size: 1.1rem;
    cursor: pointer;
    line-height: 1;
  }
  .btn-remove-range:hover { color: #ef4444; }

  /* Checkボタン・結果 */
  .check-row { margin-top: 12px; display: flex; justify-content: flex-end; }
  #checkBtn {
    background: #111;
    border: none;
    color: #fff;
    font-size: 0.88rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 10px 28px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
  }
  #checkBtn:hover { background: #6366f1; }

  .check-result {
    margin-top: 14px;
    background: #f9fafb;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    padding: 16px 20px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }
  .result-card {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .result-card .rc-label {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #9ca3af;
  }
  .result-card .rc-count {
    font-size: 2rem;
    font-weight: 800;
    color: #111;
    line-height: 1;
  }
  .result-card .rc-sub {
    font-size: 0.75rem;
    color: #6b7280;
  }
  .result-matched {
    margin-top: 14px;
    width: 100%;
    border-top: 1px solid #e5e7eb;
    padding-top: 12px;
  }
  .result-matched .rm-title {
    font-size: 0.72rem;
    font-weight: 600;
    color: #9ca3af;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .matched-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .matched-tag {
    background: #ede9fe;
    color: #5b21b6;
    border-radius: 5px;
    padding: 3px 9px;
    font-size: 0.8rem;
    font-weight: 500;
  }
  .matched-tag.words-tag {
    background: #dcfce7;
    color: #166534;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #2e3150; border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">English Checker</div>
</header>

<main>
  <!-- タブ -->
  <div class="tabs">
    <button class="tab-btn active" id="tabChecker">Checker</button>
    <button class="tab-btn" id="tabLookup">Look up</button>
    <button class="tab-btn" id="tabWordlist">Word list</button>
  </div>

  <!-- Checker パネル -->
  <div id="panelChecker">
  <!-- ページ指定 -->
  <div class="page-section">
    <div class="label">範囲指定</div>
    <div class="range-container" id="rangeContainer"></div>
    <button class="btn-add-range" id="addRangeBtn" style="margin-top:10px;">+ 範囲を追加</button>
  </div>

  <!-- テキスト入力 -->
  <div class="label" style="margin-top:20px;">テキスト入力</div>
  <textarea id="mainText" placeholder="ここに長文を入力してください..."></textarea>

  <!-- Checkボタン -->
  <div class="check-row">
    <button id="checkBtn">Check</button>
  </div>

  <!-- 結果表示 -->
  <div id="checkResult" class="check-result" style="display:none;"></div>
  </div><!-- /panelChecker -->

  <!-- Word list パネル -->
  <div id="panelWordlist" style="display:none;">
    <div id="wordlistContent"></div>
  </div>

  <!-- Look up パネル -->
  <div id="panelLookup" style="display:none;">
    <div class="lookup-row">
      <input type="text" id="lookupInput" placeholder="語を入力..." />
      <button id="lookupBtn">Look up</button>
    </div>
    <div class="lookup-result" id="lookupResult"></div>
  </div>
</main>

<button id="adminBtn">管理者</button>

<!-- パスワードモーダル -->
<div class="overlay" id="passOverlay">
  <div class="pass-modal">
    <h2>管理者ログイン</h2>
    <input type="password" id="passInput" placeholder="パスワード" />
    <div class="pass-err" id="passErr">パスワードが正しくありません。</div>
    <div class="modal-btns">
      <button class="btn-cancel" id="passCancel">キャンセル</button>
      <button class="btn-ok" id="passEnter">ログイン</button>
    </div>
  </div>
</div>

<!-- CMDモーダル -->
<div class="cmd-overlay" id="cmdOverlay">
  <div class="cmd-modal">
    <div class="cmd-titlebar">
      <span class="dot dot-r"></span>
      <span class="dot dot-y"></span>
      <span class="dot dot-g"></span>
      <span class="cmd-title-text">管理者 CMD — Firebase</span>
      <button class="cmd-close" id="cmdClose">✕</button>
    </div>
    <div class="cmd-output" id="cmdOutput"></div>
    <div class="cmd-input-row">
      <span class="cmd-ps">$</span>
      <input id="cmdInput" type="text" placeholder="コマンドを入力..." autocomplete="off" />
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCPdILlioJpXCnxYmmEXoHgW6kCwHZ4NjU",
  authDomain: "tango-bunpou-checker.firebaseapp.com",
  projectId: "tango-bunpou-checker",
  storageBucket: "tango-bunpou-checker.firebasestorage.app",
  messagingSenderId: "875208468520",
  appId: "1:875208468520:web:17070aea1c2f6f462f6d1d",
  databaseURL: "https://tango-bunpou-checker-default-rtdb.firebaseio.com/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const LISTS = ["bumpou", "hani", "words", "imi", "reibun", "haniname"];
let isAdmin = false;
let globalHaniNames = [];

// ---- Helpers ----
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function parseArgs(str) {
  const tokens = [];
  let cur = "", inQ = false;
  for (const c of str) {
    if (c === '"') inQ = !inQ;
    else if (c === ' ' && !inQ) { if (cur) tokens.push(cur); cur = ""; }
    else cur += c;
  }
  if (cur) tokens.push(cur);
  return tokens;
}

const MERGED = ["bumpou", "words"]; 

async function getRawList(name) {
  const snap = await get(ref(db, `lists/${name}`));
  if (!snap.exists()) return [];
  const val = snap.val();
  if (Array.isArray(val)) return val.filter(v => v !== null && v !== undefined);
  return Object.values(val);
}

async function saveRawList(name, arr) {
  await set(ref(db, `lists/${name}`), arr);
}

async function getList(name) {
  if (MERGED.includes(name)) return getRawList("bwitems");
  return getRawList(name);
}

async function saveList(name, arr) {
  if (MERGED.includes(name)) return saveRawList("bwitems", arr);
  return saveRawList(name, arr);
}

async function addToBW(pos, kind, val) {
  const entry = kind + ":" + val;
  const arr = await getRawList("bwitems");
  if (pos === "f") arr.push(entry);
  else {
    const i = parseInt(pos);
    arr.splice(isNaN(i) || i < 0 ? arr.length : i, 0, entry);
  }
  await saveRawList("bwitems", arr);
  return arr.length;
}

function filterBW(arr, kind) {
  const prefix = kind + ":";
  return arr.filter(v => String(v).startsWith(prefix)).map(v => String(v).slice(prefix.length));
}

// ---- CMD ----
const cmdOutput = document.getElementById("cmdOutput");
const cmdInput  = document.getElementById("cmdInput");
let history = [], histIdx = -1;

function print(html, cls = "cmd-info") {
  const d = document.createElement("div");
  d.className = `cmd-line ${cls}`;
  d.innerHTML = html;
  cmdOutput.appendChild(d);
  cmdOutput.scrollTop = cmdOutput.scrollHeight;
}

function initCmdMessages() {
  cmdOutput.innerHTML = "";
  print("Firebase 接続済み ✓", "cmd-ok");
  print("add f haniname 'Lesson 1'  /  show haniname", "cmd-info");
}

async function addTo(pos, name, val) {
  if (MERGED.includes(name)) { await addToBW(pos, name, val); return; }
  const arr = await getRawList(name);
  if (pos === "f") arr.push(val);
  else {
    const i = parseInt(pos);
    arr.splice(isNaN(i) || i < 0 ? arr.length : i, 0, val);
  }
  await saveRawList(name, arr);
}

async function handleCmd(raw) {
  const trimmed = raw.trim();
  if (!trimmed) return;
  print(escHtml(trimmed), "cmd-in");
  history.unshift(trimmed); histIdx = -1;

  const tokens = parseArgs(trimmed);
  const cmd = tokens[0]?.toLowerCase();

  if (cmd === "show") {
    const name = tokens[1];
    if (!name || !LISTS.includes(name)) { print(`エラー: show &lt;${LISTS.join("|")}&gt;`, "cmd-err"); return; }
    const arr = await getList(name);
    if (!arr.length) { print(`[${name}] は空です`, "cmd-info"); return; }
    arr.forEach((v, i) => { print(`<span class="show-idx">${String(i).padStart(3)}. </span><span class="show-val">${escHtml(v)}</span>`); });
    return;
  }

  if (cmd === "add") {
    const pos = tokens[1], listArg = tokens[2], rest = tokens.slice(3).join(" ");
    if (!pos || !listArg) { print("エラー: add &lt;f|番号&gt; &lt;リスト|allb|allw&gt; [値]", "cmd-err"); return; }
    if (listArg.toLowerCase() === "allb" || listArg.toLowerCase() === "allw") {
      const mainVal = tokens[3] || "", imiVal = tokens[4] || "", reibunVal = tokens[5] || "";
      const mainList = listArg.toLowerCase() === "allb" ? "bumpou" : "words";
      await addTo(pos, mainList, mainVal); await addTo(pos, "imi", imiVal); await addTo(pos, "reibun", reibunVal);
      print(`追加: [${mainList}] "${escHtml(mainVal)}" / [imi] "${escHtml(imiVal)}" / [reibun] "${escHtml(reibunVal)}"`, "cmd-ok");
      return;
    }
    if (!LISTS.includes(listArg)) { print(`エラー: 不明なリスト "${escHtml(listArg)}"`, "cmd-err"); return; }
    await addTo(pos, listArg, rest);
    print(`追加: [${listArg}] "${escHtml(rest)}"`, "cmd-ok");
    if (listArg === "haniname") await initHaniUI();
    return;
  }

  if (cmd === "remove") {
    const posRm = tokens[1], name = tokens[2];
    if (!posRm || !name) { print("エラー: remove &lt;f|番号&gt; &lt;リスト|allb|allw&gt;", "cmd-err"); return; }
    if (name.toLowerCase() === "allb" || name.toLowerCase() === "allw") {
      const bwArr = await getRawList("bwitems"), imiArr = await getRawList("imi"), rbArr = await getRawList("reibun");
      const idx = posRm === "f" ? bwArr.length - 1 : parseInt(posRm);
      if (isNaN(idx) || idx < 0 || idx >= bwArr.length) { print(`エラー: 範囲外`, "cmd-err"); return; }
      bwArr.splice(idx, 1); imiArr.splice(idx, 1); rbArr.splice(idx, 1);
      await saveRawList("bwitems", bwArr); await saveRawList("imi", imiArr); await saveRawList("reibun", rbArr);
      print(`削除完了`, "cmd-ok"); return;
    }
    const arr = await getList(name);
    const idx = posRm === "f" ? arr.length - 1 : parseInt(posRm);
    if (isNaN(idx) || idx < 0 || idx >= arr.length) { print(`エラー: 範囲外`, "cmd-err"); return; }
    arr.splice(idx, 1); await saveList(name, arr);
    print(`削除完了`, "cmd-ok");
    if (name === "haniname") await initHaniUI();
    return;
  }

  if (cmd === "replace") {
    const posR = tokens[1], name = tokens[2];
    if (!posR || !name) { print("エラー: replace &lt;f|番号&gt; &lt;リスト&gt; &lt;新しい値&gt;", "cmd-err"); return; }
    const arr = await getList(name);
    const idx = posR === "f" ? arr.length - 1 : parseInt(posR);
    if (isNaN(idx) || idx < 0 || idx >= arr.length) { print(`エラー: 範囲外`, "cmd-err"); return; }
    arr[idx] = tokens.slice(3).join(" ");
    await saveList(name, arr);
    print(`置換完了`, "cmd-ok");
    if (name === "haniname") await initHaniUI();
    return;
  }
  print(`不明なコマンド: "${escHtml(cmd)}"`, "cmd-err");
}

cmdInput.addEventListener("keydown", async e => {
  if (e.key === "Enter") {
    const v = cmdInput.value; cmdInput.value = "";
    try { await handleCmd(v); } catch(err) { print("エラー: " + escHtml(err.message), "cmd-err"); }
  } else if (e.key === "ArrowUp") {
    histIdx = Math.min(histIdx + 1, history.length - 1);
    cmdInput.value = history[histIdx] || ""; e.preventDefault();
  } else if (e.key === "ArrowDown") {
    histIdx = Math.max(histIdx - 1, -1);
    cmdInput.value = histIdx >= 0 ? history[histIdx] : ""; e.preventDefault();
  }
});

// ---- CANDO & Conjugation ----
const CANDO = new Set(["can","will","may","must","should","might","could","would","are","is","do","did","does","was","were"]);

function getConjugations(base, doubleConsonant) {
  const forms = new Set([base]);
  const lastChar = base.slice(-1);
  if (doubleConsonant) { 
    forms.add(base + lastChar + "ing"); 
    forms.add(base + lastChar + "ed"); 
  }
  else if (/ie$/.test(base)) { forms.add(base.slice(0, -2) + "ying"); forms.add(base + "d"); }
  else if (/e$/.test(base)) { forms.add(base.slice(0, -1) + "ing"); forms.add(base + "d"); }
  else if (/[^aeiou]y$/.test(base)) { forms.add(base.slice(0, -1) + "ing"); forms.add(base.slice(0, -1) + "ied"); }
  else { forms.add(base + "ing"); forms.add(base + "ed"); }
  
  if (/[sxzh]$/.test(base) || /[^aeiou]h$/.test(base)) forms.add(base + "es");
  else if (/[^aeiou]y$/.test(base)) forms.add(base.slice(0, -1) + "ies");
  else forms.add(base + "s");
  
  if (CANDO.has(base)) {
    if (base === "can") forms.add("can't");
    else if (base === "will") forms.add("won't");
    else if (base === "do") forms.add("don't");
    else forms.add(base + "n't");
  }
  return forms;
}

function getPlurals(base) {
  const forms = new Set([base]);
  if (/[sxzh]$/.test(base) || /[^aeiou]h$/.test(base)) forms.add(base + "es");
  else if (/[^aeiou]y$/.test(base)) forms.add(base.slice(0, -1) + "ies");
  else forms.add(base + "s");
  
  if (CANDO.has(base)) {
    if (base === "can") forms.add("can't");
    else if (base === "will") forms.add("won't");
    else if (base === "do") forms.add("don't");
    else forms.add(base + "n't");
  }
  return forms;
}

// ---- parseTerm: -c- フラグ対応 ----
// -c- は語と語の間に置く: "What-c-for?" → parts=["what","for?"], crossSentenceCheck=true
// crossSentenceCheck=true のとき、マッチした区間（元テキスト）に . や ? が含まれていたら無効
function parseTerm(raw) {
  let rawStr = String(raw).trim().toLowerCase();
  let irregular = false, commaRequired = false, crossSentenceCheck = false;

  if (rawStr.endsWith("!irregular!")) { rawStr = rawStr.replace(/!irregular!$/, "").trim(); irregular = true; }
  if (rawStr.endsWith("$irregular$")) { rawStr = rawStr.replace(/\$irregular\$$/, "").trim(); commaRequired = true; }

  // -c- フラグを検出して除去（語間のセパレータとして扱う）
  if (rawStr.includes("-c-")) {
    crossSentenceCheck = true;
    rawStr = rawStr.replace(/-c-/g, " ");
  }

  const parts = rawStr.trim().split(/\s+/);
  const parsedParts = parts.map(p => {
    let term = p, conjugate = false, doubleConsonant = false;
    if (term.endsWith("%dd%")) { term = term.replace(/%dd%$/, ""); conjugate = true; doubleConsonant = true; }
    else if (term.endsWith("%d%")) { term = term.replace(/%d%$/, ""); conjugate = true; }
    return { term, conjugate, doubleConsonant };
  });

  return { 
    original: rawStr.replace(/(%d%|%dd%)/g, "").replace(/\s+/g, " ").trim(),
    parts: parsedParts,
    irregular, 
    commaRequired,
    crossSentenceCheck   // ← 追加
  };
}

// ---- 文境界チェック ----
// トークン列上の [startTokenIdx, endTokenIdx) の区間が元テキスト上で
// 同一文（. や ? をまたがない）かを確認する
// textTokens: テキストをトークン分割した配列
// originalText: 元のテキスト（小文字化前）
// phraseTokenCount: フレーズのトークン数
// matchedTokenStart: マッチ開始トークンインデックス
function isWithinSameSentence(originalText, matchedTokenStart, phraseTokenCount) {
  // テキスト全体を小文字化してトークン位置を求める
  const lower = originalText.toLowerCase();
  // トークンを順に検索して文字位置を取得
  const tokenRegex = /[a-zA-Z'-]+/g;
  const tokenPositions = [];
  let m;
  while ((m = tokenRegex.exec(lower)) !== null) {
    tokenPositions.push({ start: m.index, end: m.index + m[0].length });
  }

  if (matchedTokenStart + phraseTokenCount - 1 >= tokenPositions.length) return false;

  const charStart = tokenPositions[matchedTokenStart].start;
  const charEnd   = tokenPositions[matchedTokenStart + phraseTokenCount - 1].end;

  // charStart〜charEnd の間の文字列に . や ? が含まれるか
  // （最初のトークン直後から最後のトークン直前までを調べる）
  const between = lower.slice(charStart, charEnd);
  return !/[.?!]/.test(between);
}

// ---- Check Logic ----
async function resolveMultipleRanges() {
  const container = document.getElementById("rangeContainer");
  const rows = container.querySelectorAll(".range-row");
  const haniList = await getList("hani");
  if (!haniList.length) return null;
  const haniNums = haniList.map(v => parseInt(String(v).trim())).filter(n => !isNaN(n));
  let entrySet = new Set();
  rows.forEach(row => {
    const startIdx = parseInt(row.querySelector(".start-hani").value) - 1;
    const endIdx   = parseInt(row.querySelector(".end-hani").value) - 1;
    const s = Math.min(startIdx, endIdx), e = Math.max(startIdx, endIdx);
    for (let i = s; i <= e; i++) {
      const startLine = i === 0 ? 1 : haniNums[i - 1] + 1;
      const endLine   = haniNums[i];
      for (let j = startLine; j <= endLine; j++) entrySet.add(j);
    }
  });
  return entrySet.size > 0 ? entrySet : null;
}

document.getElementById("checkBtn").addEventListener("click", async () => {
  const text = document.getElementById("mainText").value;
  if (!text.trim()) return;
  const bwRaw = await getRawList("bwitems"), entryFilter = await resolveMultipleRanges();
  const filteredBW = entryFilter ? bwRaw.filter((_, i) => entryFilter.has(i + 1)) : bwRaw;
  const textTokens = text.toLowerCase().match(/[a-zA-Z'-]+/g) || [];
  const joinedText = textTokens.join(" ");

  // すべてのマッチ候補を抽出
  let candidates = [];
  filteredBW.forEach(rawEntry => {
    const isWordsList = String(rawEntry).startsWith("words:");
    const entry = parseTerm(isWordsList ? String(rawEntry).slice(6) : String(rawEntry).slice(7));
    
    let phrasePatterns = [[]];
    entry.parts.forEach(p => {
      let newPatterns = [];
      let forms = [p.term];
      if (p.conjugate) forms = Array.from(getConjugations(p.term, p.doubleConsonant));
      else if (isWordsList && entry.parts.length === 1) forms = Array.from(getPlurals(p.term));
      else if (!isWordsList && entry.parts.length === 1 && CANDO.has(p.term)) forms = Array.from(getPlurals(p.term));
      
      forms.forEach(f => { phrasePatterns.forEach(pat => { newPatterns.push([...pat, f]); }); });
      phrasePatterns = newPatterns;
    });

    phrasePatterns.forEach(pat => {
      const phrase = pat.join(" ");
      const phraseTokenCount = pat.length;
      let pos = -1;
      while ((pos = joinedText.indexOf(phrase, pos + 1)) !== -1) {
        // 単語の境界をチェック
        const before = pos === 0 || joinedText[pos-1] === ' ';
        const after = pos + phrase.length === joinedText.length || joinedText[pos + phrase.length] === ' ';
        if (before && after) {
          // !irregular! 等の特殊条件チェック
          if (entry.irregular) {
            const nextWord = joinedText.slice(pos + phrase.length).trim().split(" ")[0];
            if (nextWord && CANDO.has(nextWord)) continue;
          }
          if (entry.commaRequired) {
            const rawLower = text.toLowerCase();
            const escaped = entry.original.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            if (!(new RegExp(",\\s*" + escaped)).test(rawLower)) continue;
          }

          // -c- フラグ: 同一文チェック（. や ? をまたいでいたらスキップ）
          if (entry.crossSentenceCheck && phraseTokenCount > 1) {
            // joinedText 上でのマッチ開始トークンインデックスを求める
            const tokensBefore = joinedText.slice(0, pos).split(" ").filter(t => t.length > 0);
            const matchedTokenStart = tokensBefore.length;
            if (!isWithinSameSentence(text, matchedTokenStart, phraseTokenCount)) continue;
          }

          candidates.push({
            original: entry.original,
            matchedPhrase: phrase,
            start: pos,
            end: pos + phrase.length,
            isWords: isWordsList,
            length: phrase.length
          });
        }
      }
    });
  });

  // 重複排除ロジック
  candidates.sort((a, b) => a.start - b.start || b.length - a.length);

  const finalBumpou = new Set();
  const finalWords = new Set();
  const usedRanges = [];

  // wordsを優先して処理
  candidates.filter(c => c.isWords).forEach(c => {
    if (!usedRanges.some(r => (c.start < r.end && c.end > r.start))) {
      finalWords.add(c.original);
      usedRanges.push({start: c.start, end: c.end});
    }
  });

  // bumpouを処理（既にwordsで使われた範囲はスキップ）
  candidates.filter(c => !c.isWords).forEach(c => {
    if (!usedRanges.some(r => (c.start < r.end && c.end > r.start))) {
      finalBumpou.add(c.original);
      usedRanges.push({start: c.start, end: c.end});
    }
  });

  const bumpouMatched = Array.from(finalBumpou);
  const wordsMatched = Array.from(finalWords);
  const resultDiv = document.getElementById("checkResult"); resultDiv.style.display = "flex"; resultDiv.style.flexDirection = "column";
  const bumpouCount = bumpouMatched.length, wordsCount = wordsMatched.length;
  const totalPoints = bumpouCount + wordsCount * 2, wordCount = textTokens.length;

  let html = `
    <div style="display:flex;gap:24px;flex-wrap:wrap;align-items:flex-end;">
      <div class="result-card"><div class="rc-label">Grammar</div><div class="rc-count">${bumpouCount}</div><div class="rc-sub">× 1pt = ${bumpouCount}pt</div></div>
      <div class="result-card"><div class="rc-label">Key Words</div><div class="rc-count">${wordsCount}</div><div class="rc-sub">× 2pt = ${wordsCount * 2}pt</div></div>
      <div class="result-card"><div class="rc-label">語数</div><div class="rc-count" style="font-size:1.4rem;">${wordCount}</div><div class="rc-sub">words</div></div>
    </div>
  `;
  if (bumpouMatched.length) html += `<div class="result-matched"><div class="rm-title">Grammar</div><div class="matched-tags">${bumpouMatched.map(t => `<span class="matched-tag">${escHtml(t)}</span>`).join("")}</div></div>`;
  if (wordsMatched.length) html += `<div class="result-matched"><div class="rm-title">Key Words</div><div class="matched-tags">${wordsMatched.map(t => `<span class="matched-tag words-tag">${escHtml(t)}</span>`).join("")}</div></div>`;
  html += `<div style="margin-top:18px;padding-top:16px;border-top:1.5px solid #e5e7eb;display:flex;align-items:baseline;gap:10px;"><div style="font-size:0.72rem;font-weight:700;color:#9ca3af;">TOTAL POINTS</div><div style="font-size:3rem;font-weight:900;color:#6366f1;">${totalPoints}</div><div style="font-size:1rem;font-weight:600;color:#6366f1;">pt</div></div>`;
  resultDiv.innerHTML = html;
});

// ---- Tabs & Wordlist ----
function switchTab(tab) {
  ["panelChecker", "panelLookup", "panelWordlist"].forEach(p => document.getElementById(p).style.display = "none");
  ["tabChecker", "tabLookup", "tabWordlist"].forEach(t => document.getElementById(t).classList.remove("active"));
  document.getElementById("panel" + tab.charAt(0).toUpperCase() + tab.slice(1)).style.display = "";
  document.getElementById("tab" + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add("active");
  if (tab === "wordlist") loadWordList();
}
document.getElementById("tabChecker").addEventListener("click", () => switchTab("checker"));
document.getElementById("tabLookup").addEventListener("click", () => switchTab("lookup"));
document.getElementById("tabWordlist").addEventListener("click", () => switchTab("wordlist"));

async function loadWordList() {
  const el = document.getElementById("wordlistContent");
  el.innerHTML = '<div class="wl-loading">読み込み中...</div>';
  const bwRaw = await getRawList("bwitems"), imiRaw = await getRawList("imi"), haniRaw = await getRawList("hani"), haniNames = await getRawList("haniname");
  const haniNums = haniRaw.map(v => parseInt(String(v).trim())).filter(n => !isNaN(n));
  let rows = '<div class="wl-wrap"><table class="wl-table"><thead><tr><th>語</th><th>意味</th></tr></thead><tbody>';
  
  let currentSection = 0;
  bwRaw.forEach((v, i) => {
    const lineNum = i + 1;
    while (currentSection < haniNums.length && lineNum > (currentSection === 0 ? 0 : haniNums[currentSection - 1]) && lineNum === (currentSection === 0 ? 1 : haniNums[currentSection - 1] + 1)) {
       rows += `<tr class="wl-section-row"><td colspan="2">${escHtml(haniNames[currentSection] || (currentSection + 1) + "ページ目")}</td></tr>`;
       break;
    }
    const s = String(v); let term = null;
    if (s.startsWith("bumpou:")) term = s.slice(7).replace(/-c-/g, "~").replace(/(!irregular!|\$irregular\$|%dd%|%d%)/g, "").replace(/\s+/g, " ").trim();
    else if (s.startsWith("words:")) term = s.slice(6).replace(/-c-/g, "~").replace(/(!irregular!|\$irregular\$|%dd%|%d%)/g, "").replace(/\s+/g, " ").trim();
    if (term) rows += `<tr><td>${escHtml(term)}</td><td class="wl-imi">${escHtml(imiRaw[i] || "")}</td></tr>`;
    if (lineNum >= haniNums[currentSection]) currentSection++;
  });
  el.innerHTML = rows + '</tbody></table></div>';
}

// ---- Look up ----
async function doLookup() {
  const query = document.getElementById("lookupInput").value.trim().toLowerCase();
  if (!query) return;
  const bwRaw = await getRawList("bwitems"), imiRaw = await getRawList("imi"), reibunRaw = await getRawList("reibun");
  const matches = [];
  bwRaw.forEach((v, i) => {
    const s = String(v); let term = "";
    if (s.startsWith("bumpou:")) term = s.slice(7).replace(/-c-/g, "~").replace(/(!irregular!|\$irregular\$|%dd%|%d%)/g, "").replace(/\s+/g, " ").trim().toLowerCase();
    else if (s.startsWith("words:")) term = s.slice(6).replace(/-c-/g, "~").replace(/(!irregular!|\$irregular\$|%dd%|%d%)/g, "").replace(/\s+/g, " ").trim().toLowerCase();
    if (term === query) matches.push({ kind: s.startsWith("bumpou:") ? "文法" : "単語", term: s.split(":")[1].replace(/-c-/g, "~").replace(/(!irregular!|\$irregular\$|%dd%|%d%)/g, "").replace(/\s+/g, " ").trim(), idx: i });
  });
  const res = document.getElementById("lookupResult"); res.style.display = "flex";
  if (!matches.length) { res.innerHTML = `<div class="lookup-not-found">"${escHtml(query)}" は見つかりませんでした。</div>`; return; }
  res.innerHTML = matches.map((m, i) => `
    ${i > 0 ? '<hr class="lookup-divider">' : ""}
    <div class="lookup-word">${escHtml(m.term)} <span style="font-size:0.7rem;color:#9ca3af;">${m.kind}</span></div>
    <div><div class="lookup-kind">意味</div><div class="lookup-val">${escHtml(imiRaw[m.idx] || "—")}</div></div>
    <div><div class="lookup-kind">例文</div><div class="lookup-val">${escHtml(reibunRaw[m.idx] || "Don't make")}</div></div>
  `).join("");
}
document.getElementById("lookupBtn").addEventListener("click", doLookup);
document.getElementById("lookupInput").addEventListener("keydown", e => { if (e.key === "Enter") doLookup(); });
